name: Agentic Truth CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install all requirements layers
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements_core.txt ]; then pip install -r requirements_core.txt; fi
        if [ -f requirements_ml.txt ]; then pip install -r requirements_ml.txt; fi
        
    - name: Run Backend Tests
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        # Use pytest for all tests under the /tests directory
        pip install pytest pytest-asyncio
        echo "Running tests..."
        pytest tests/

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build React App
      run: npm run build

  docker-build-test:
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker Compose Stack
      run: |
        docker-compose build
        docker-compose up -d
        sleep 10
        docker ps
        docker-compose down
